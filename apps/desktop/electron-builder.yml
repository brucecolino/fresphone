appId: app.freshphone.desktop
productName: FreshPhone
copyright: © 2026 FreshPhone

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

# I binari del dispositivo (libimobiledevice / pymobiledevice3 / ffmpeg) vanno in
# resources/bin e vengono inclusi nell'installer.
extraResources:
  - from: resources/bin
    to: bin
    filter:
      - '**/*'
  # Driver Apple (Apple Mobile Device Support) installati in automatico dall'installer.
  - from: resources/drivers
    to: drivers
    filter:
      - '**/*.msi'

win:
  target: nsis
  icon: build/icon.png
  artifactName: FreshPhone-Setup-${version}.${ext}

nsis:
  oneClick: false
  # perMachine: l'installer gira elevato (admin), necessario per installare i driver
  # Apple (driver USB + servizio) in modo automatico e silenzioso.
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: FreshPhone
  # Script con la macro customInstall che installa i driver Apple se assenti.
  include: build/installer.nsh

# Registra il protocollo freshphone:// all'installazione (attivazione licenza da web).
protocols:
  - name: FreshPhone
    schemes:
      - freshphone
